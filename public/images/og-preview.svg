  <text x="174" y="395" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="18" fill="#64748b"> Daily Users</text>

  <text x="330" y="395" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="22" fill="#22c55e">LeetCode Knight</text>

  <text x="530" y="395" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="22" fill="#f59e0b">CodeChef 4★</text>

  <!-- Tech tags -->
  <rect x="114" y="418" width="78" height="30" rx="8" fill="#6366f120"/>
  <text x="153" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">React</text>

  <rect x="202" y="418" width="56" height="30" rx="8" fill="#6366f120"/>
  <text x="230" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">C#</text>

  <rect x="268" y="418" width="68" height="30" rx="8" fill="#6366f120"/>
  <text x="302" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">Azure</text>

  <rect x="346" y="418" width="78" height="30" rx="8" fill="#6366f120"/>
  <text x="385" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">Python</text>

  <rect x="434" y="418" width="90" height="30" rx="8" fill="#6366f120"/>
  <text x="479" y="438" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#818cf8" text-anchor="middle">GPT-4o</text>


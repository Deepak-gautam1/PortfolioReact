<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow blobs -->
  <ellipse cx="150" cy="150" rx="300" ry="200" fill="#6366f1" fill-opacity="0.08"/>
  <ellipse cx="1100" cy="500" rx="280" ry="200" fill="#22c55e" fill-opacity="0.07"/>

  <!-- Left accent bar -->
  <rect x="80" y="180" width="5" height="270" rx="2.5" fill="url(#accent)"/>

  <!-- Name -->
  <text x="112" y="265" font-family="system-ui,-apple-system,sans-serif" font-weight="700" font-size="72" fill="white" letter-spacing="-2">DEEPAK GAUTAM</text>

  <!-- Role — now Data Engineer -->
  <text x="114" y="320" font-family="system-ui,-apple-system,sans-serif" font-weight="400" font-size="28" fill="#94a3b8">Data Engineer · Loyalty Systems &amp; AI</text>

  <!-- Divider line -->
  <rect x="114" y="348" width="600" height="1.5" rx="1" fill="#334155"/>

  <!-- Stats row -->
